# Model registry — the single source of truth for what gets benchmarked.
#
# To add a new model variant:
#   1. Edit this file (no code changes needed)
#   2. Run: uv run python scripts/sync_models.py --all-missing
#   3. Run: uv run python scripts/run_bench.py --all-pending
#      and: uv run python scripts/run_evals.py --all-variants --suite full
#
# Schema: see src/llm_bench/registry.py for dataclass definitions.
#
# Hosted OpenAI-compatible endpoints can be declared without local artifacts:
#
#   - id: provider-model
#     family: hosted
#     architecture: dense
#     variants:
#       - key: provider-model-api
#         fmt: api
#         backend: openai-compatible
#         artifact_type: endpoint
#         path: https://provider.example/v1
#         api_model: provider/model
#         api_key_env: PROVIDER_API_KEY
#         quant: hosted
#         tier: hosted
#         capabilities: [chat, completions, logprobs, code_eval_chat, tool_use_eval]

defaults:
  # Where local GGUF files live. Referenced as {gguf_dir} in variant.path.
  gguf_dir: "~/models/gguf"

